<body onload="startGame()">

    <div style="text-align: center;">
    <h2>Block Push Game</h2>
    <p>Push blocks by touching them. You can push up to 2 at once.</p>
    <canvas id="gameCanvas" width="500" height="500" style = "background-color:blanchedalmond;"></canvas>
    </div>
    <script>
        let canvas, ctx;

        const PLAYER_SIZE = 30;
        const BLOCK_SIZE = 40;
        const SPEED = 5;

        class Player{
            constructor(x,y){
                this.x =x;
                this.y = y;
                this.size = PLAYER_SIZE;
            }

            draw(){
                ctx.fillStyle = "blue";
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
            
            move(dx, dy){
                let newX = player.x + dx;
                let newY = player.y + dy;

                if(newX < 0 || newX > canvas.width-30 || newY < 0 || newY > canvas.height-30){
                    return;
                }
                player.x = newX;
                player.y = newY;

                draw();
            }
        }
            function startGame(){
                canvas = document.getElementById("gameCanvas");
                ctx = canvas.getContext("2d");
                player = new Player(235,235);
                document.addEventListener("keydown", handleKeys);
                draw();
            }

            

            function draw(){
                ctx.clearRect(0,0, canvas.width, canvas.height);
                player.draw();
            }

            function handleKeys(e){
                if (e.key === "w"){
                    player.move(0,-SPEED);
                }
                if (e.key === "a"){
                    player.move(-SPEED, 0);
                }
                if (e.key === "s"){
                    player.move(0, SPEED);
                }
                if (e.key === "d"){
                    player.move(SPEED,0);
                }
            }



        



    </script>
</body>
